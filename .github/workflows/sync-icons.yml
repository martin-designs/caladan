name: Sync Icons from Figma

# Run manually from GitHub by clicking a button
on:
  workflow_dispatch:

jobs:
  sync-icons:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Export icons from Figma
        run: node scripts/export-icons.js
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: oWyNqsZJKJYF8SpZsBPb9P

      - name: Optimize SVGs
        run: npm run optimize-icons

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add icons/svg/
          git diff --staged --quiet || git commit -m "chore: sync icons from Figma"
          git push
