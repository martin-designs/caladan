name: Tokens - Spacing (Figma to JSON Export)

# Run manually from GitHub Actions
on:
  workflow_dispatch:

# Allow the workflow to commit and push back to the repo
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-spacing-tokens:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Export spacing tokens from Figma
        run: node scripts/export-spacing-tokens.js
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          FIGMA_FILE_KEY: oWyNqsZJKJYF8SpZsBPb9P

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/spacing-primitives.json tokens/spacing-aliases.json
          git diff --staged --quiet || git commit -m "chore: sync spacing tokens from Figma"
          git push
